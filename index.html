<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e4e2da;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #d3d1c7;
      border-radius: 8px;
      outline: none;
      transition: border 0.2s;
      color: #1a1a18;
    }
    input[type="text"]:focus { border-color: #888; }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      align-items: flex-end;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-grow { flex: 1; }

    input[type="range"] {
      width: 100%;
      accent-color: #333;
    }

    input[type="color"] {
      width: 44px;
      height: 36px;
      border: 1px solid #d3d1c7;
      border-radius: 8px;
      cursor: pointer;
      padding: 2px;
      background: none;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .range-val {
      font-size: 13px;
      min-width: 36px;
      color: #444;
    }

    button.primary {
      width: 100%;
      margin-top: 1.25rem;
      padding: 11px;
      font-size: 15px;
      font-weight: 500;
      background: #1a1a18;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button.primary:hover { background: #333; }

    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 1.5rem;
    }

    .qr-box {
      border: 1px solid #e4e2da;
      border-radius: 12px;
      padding: 16px;
      background: #fff;
    }

    button.dl {
      padding: 9px 28px;
      font-size: 14px;
      border: 1px solid #d3d1c7;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      color: #1a1a18;
      transition: background 0.15s;
      display: none;
    }
    button.dl:hover { background: #f5f4f0; }

    .hint {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>QR Code Generator</h1>

    <div class="field">
      <label>ลิงก์หรือข้อความ</label>
      <input type="text" id="urlInput" placeholder="https://example.com" value="https://" />
    </div>

    <div class="row" style="margin-top: 1rem;">
      <div class="field field-grow">
        <label>ขนาด (px)</label>
        <div class="range-row">
          <input type="range" id="sizeRange" min="128" max="512" value="256" step="32"
            oninput="document.getElementById('sizeOut').textContent=this.value" />
          <span class="range-val" id="sizeOut">256</span>
        </div>
      </div>
      <div class="field">
        <label>สีหน้า</label>
        <input type="color" id="fgColor" value="#000000" />
      </div>
      <div class="field">
        <label>สีพื้น</label>
        <input type="color" id="bgColor" value="#ffffff" />
      </div>
    </div>

    <button class="primary" onclick="generateQR()">สร้าง QR Code</button>

    <div class="qr-wrap">
      <div class="qr-box" id="qrBox" style="display:none;">
        <div id="qrContainer"></div>
      </div>
      <button class="dl" id="dlBtn" onclick="downloadQR()">ดาวน์โหลด PNG</button>
      <p class="hint" id="hint"></p>
    </div>
  </div>

  <script>
    function generateQR() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) {
        document.getElementById('hint').textContent = 'กรุณาใส่ลิงก์หรือข้อความก่อนนะครับ';
        return;
      }

      const size = parseInt(document.getElementById('sizeRange').value);
      const fg = document.getElementById('fgColor').value;
      const bg = document.getElementById('bgColor').value;

      const container = document.getElementById('qrContainer');
      container.innerHTML = '';

      new QRCode(container, {
        text: url,
        width: size,
        height: size,
        colorDark: fg,
        colorLight: bg,
        correctLevel: QRCode.CorrectLevel.H
      });

      document.getElementById('qrBox').style.display = 'block';
      document.getElementById('dlBtn').style.display = 'inline-block';
      document.getElementById('hint').textContent = 'พร้อมใช้งานแล้ว!';
    }

    function downloadQR() {
      const canvas = document.querySelector('#qrContainer canvas');
      const img = document.querySelector('#qrContainer img');
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      if (canvas) {
        link.href = canvas.toDataURL('image/png');
      } else if (img) {
        link.href = img.src;
      }
      link.click();
    }

    document.getElementById('urlInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') generateQR();
    });
  </script>
</body>
</html>
